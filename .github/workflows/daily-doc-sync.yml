name: Daily Doc Sync

on:
  schedule:
    # Beijing workdays (Mon-Fri), every 2 hours:
    # - Local 00:00-06:00 (every 2h) => UTC previous day 16:00-22:00, Sun-Thu
    - cron: "0 16-22/2 * * 0-4"
    # - Local 08:00-22:00 (every 2h) => UTC same day 00:00-14:00, Mon-Fri
    - cron: "0 0-14/2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-doc-sync
  cancel-in-progress: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Trigger Time
        run: |
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Asia/Shanghai: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run Doc Sync Hook (Optional)
        shell: bash
        run: |
          if [ -f "scripts/doc-sync.sh" ]; then
            echo "Found scripts/doc-sync.sh, running..."
            chmod +x scripts/doc-sync.sh
            scripts/doc-sync.sh
          elif [ -f "scripts/doc-sync.ps1" ]; then
            echo "Found scripts/doc-sync.ps1, running..."
            pwsh -File scripts/doc-sync.ps1
          else
            echo "No doc sync script found. Skip content sync."
          fi

      - name: Commit And Push If Changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          commit_time="$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          changed_count="$(git -c core.quotepath=false diff --cached --name-only | wc -l | tr -d ' ')"
          summary_files="$(git -c core.quotepath=false diff --cached --name-only | head -n 3 | sed 's#^.*/##' | paste -sd ',' - | sed 's/,/, /g')"
          stat_summary="$(git -c core.quotepath=false diff --cached --shortstat | sed 's/^ *//')"
          detail_list="$(git -c core.quotepath=false diff --cached --name-status | sed 's/^/- /')"

          if [ "$changed_count" -gt 3 ]; then
            summary_label="${summary_files} (+$((changed_count - 3)) more files)"
          else
            summary_label="${summary_files}"
          fi

          if [ -z "$summary_label" ]; then
            summary_label="${changed_count} files"
          fi

          git commit \
            -m "docs(sync): ${commit_time} Asia/Shanghai | updated ${summary_label}" \
            -m "Auto sync summary: ${stat_summary}

Changed files:
${detail_list}"
          git push
