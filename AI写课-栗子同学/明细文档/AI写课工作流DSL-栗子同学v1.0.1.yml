# =============================================================
# AI写课工作流 · 栗子同学 v1.0.1
# 栗子学院 · 保险课程视频脚本智能生成系统
# =============================================================
#
# 【使用前必读】
# 在导入前请完成知识库ID替换：
# 1. 在百炼平台新建5个知识库并获取各库的知识库Code
# 2. 在本文件中全局搜索替换以下5个占位符：
#
#    REPLACE_KB1_COMPLIANCE  →  合规红线库的知识库Code
#    REPLACE_KB2_CONCEPTS    →  核心概念库的知识库Code
#    REPLACE_KB3_LEGAL       →  法规条文库的知识库Code
#    REPLACE_KB4_PRODUCTS    →  产品规则库的知识库Code
#    REPLACE_KB5_CASES       →  司法案例库的知识库Code
#
# 3. 完成替换后，导入百炼工作流平台（工作流 > 导入）
# 4. 测试时建议按分支逐一验证：
#    - 知识课-旁白型（分支A：A1→A2→A3→A4→A5）
#    - 知识课-对话型（分支B：B1→B2→B3→B4）
#    - 案例课-旁白型（分支C：C1→C2→C3→C4→C5）
#    - 案例课-对话型（分支D：D1→D2→D3→D4）
#
# 【工作流架构】
# 输入 → 分析+角色匹配 → 5路并行检索 → 大纲生成 → 课程类型分支(4路)
#   → 分支A/B/C/D各自串行生成 → 合规校验 → 最终输出
#
# 【知识库说明】
# KB1 合规红线库：违禁表述、监管要求（每段生成都强制引用）
# KB2 核心概念库：保险术语、产品概念解释
# KB3 法规条文库：保险法、司法解释（精确到条文）
# KB4 产品规则库：具体险种规则、条款要点
# KB5 司法案例库：真实裁判文书案例（案例课必用）
# =============================================================

app:
  mode: workflow
  name: AI写课-栗子同学v1.0.1
  subMode: chat
kind: app
version: 0.1.0
workflow:
  graph:
    edges:
    # ── 主干：输入 → 分析 ──
    - id: Start_main-Start_main-LLM_analysis-LLM_analysis
      source: Start_main
      sourceHandle: Start_main
      target: LLM_analysis
      targetHandle: LLM_analysis

    # ── 并行检索：分析完成后同步触发5个知识库检索 ──
    - id: LLM_analysis-LLM_analysis-Retrieval_KB1-Retrieval_KB1
      source: LLM_analysis
      sourceHandle: LLM_analysis
      target: Retrieval_KB1
      targetHandle: Retrieval_KB1
    - id: LLM_analysis-LLM_analysis-Retrieval_KB2-Retrieval_KB2
      source: LLM_analysis
      sourceHandle: LLM_analysis
      target: Retrieval_KB2
      targetHandle: Retrieval_KB2
    - id: LLM_analysis-LLM_analysis-Retrieval_KB3-Retrieval_KB3
      source: LLM_analysis
      sourceHandle: LLM_analysis
      target: Retrieval_KB3
      targetHandle: Retrieval_KB3
    - id: LLM_analysis-LLM_analysis-Retrieval_KB4-Retrieval_KB4
      source: LLM_analysis
      sourceHandle: LLM_analysis
      target: Retrieval_KB4
      targetHandle: Retrieval_KB4
    - id: LLM_analysis-LLM_analysis-Retrieval_KB5-Retrieval_KB5
      source: LLM_analysis
      sourceHandle: LLM_analysis
      target: Retrieval_KB5
      targetHandle: Retrieval_KB5

    # ── 5个检索结果汇入大纲节点（等待全部完成后执行）──
    - id: Retrieval_KB1-Retrieval_KB1-LLM_outline-LLM_outline
      source: Retrieval_KB1
      sourceHandle: Retrieval_KB1
      target: LLM_outline
      targetHandle: LLM_outline
    - id: Retrieval_KB2-Retrieval_KB2-LLM_outline-LLM_outline
      source: Retrieval_KB2
      sourceHandle: Retrieval_KB2
      target: LLM_outline
      targetHandle: LLM_outline
    - id: Retrieval_KB3-Retrieval_KB3-LLM_outline-LLM_outline
      source: Retrieval_KB3
      sourceHandle: Retrieval_KB3
      target: LLM_outline
      targetHandle: LLM_outline
    - id: Retrieval_KB4-Retrieval_KB4-LLM_outline-LLM_outline
      source: Retrieval_KB4
      sourceHandle: Retrieval_KB4
      target: LLM_outline
      targetHandle: LLM_outline
    - id: Retrieval_KB5-Retrieval_KB5-LLM_outline-LLM_outline
      source: Retrieval_KB5
      sourceHandle: Retrieval_KB5
      target: LLM_outline
      targetHandle: LLM_outline

    # ── 大纲 → 分支判断 ──
    - id: LLM_outline-LLM_outline-Judge_branch-Judge_branch
      source: LLM_outline
      sourceHandle: LLM_outline
      target: Judge_branch
      targetHandle: Judge_branch

    # ── 条件分支跳转 ──
    - id: Judge_branch-branch_A-LLM_A1-LLM_A1
      source: Judge_branch
      sourceHandle: branch_A
      target: LLM_A1
      targetHandle: LLM_A1
    - id: Judge_branch-branch_B-LLM_B1-LLM_B1
      source: Judge_branch
      sourceHandle: branch_B
      target: LLM_B1
      targetHandle: LLM_B1
    - id: Judge_branch-branch_C-LLM_C1-LLM_C1
      source: Judge_branch
      sourceHandle: branch_C
      target: LLM_C1
      targetHandle: LLM_C1
    - id: Judge_branch-branch_D-LLM_D1-LLM_D1
      source: Judge_branch
      sourceHandle: branch_D
      target: LLM_D1
      targetHandle: LLM_D1

    # ── 分支A串行：知识课-旁白型（5节点）──
    - id: LLM_A1-LLM_A1-LLM_A2-LLM_A2
      source: LLM_A1
      sourceHandle: LLM_A1
      target: LLM_A2
      targetHandle: LLM_A2
    - id: LLM_A2-LLM_A2-LLM_A3-LLM_A3
      source: LLM_A2
      sourceHandle: LLM_A2
      target: LLM_A3
      targetHandle: LLM_A3
    - id: LLM_A3-LLM_A3-LLM_A4-LLM_A4
      source: LLM_A3
      sourceHandle: LLM_A3
      target: LLM_A4
      targetHandle: LLM_A4
    - id: LLM_A4-LLM_A4-LLM_A5-LLM_A5
      source: LLM_A4
      sourceHandle: LLM_A4
      target: LLM_A5
      targetHandle: LLM_A5

    # ── 分支B串行：知识课-对话型（4节点）──
    - id: LLM_B1-LLM_B1-LLM_B2-LLM_B2
      source: LLM_B1
      sourceHandle: LLM_B1
      target: LLM_B2
      targetHandle: LLM_B2
    - id: LLM_B2-LLM_B2-LLM_B3-LLM_B3
      source: LLM_B2
      sourceHandle: LLM_B2
      target: LLM_B3
      targetHandle: LLM_B3
    - id: LLM_B3-LLM_B3-LLM_B4-LLM_B4
      source: LLM_B3
      sourceHandle: LLM_B3
      target: LLM_B4
      targetHandle: LLM_B4

    # ── 分支C串行：案例课-旁白型（5节点）──
    - id: LLM_C1-LLM_C1-LLM_C2-LLM_C2
      source: LLM_C1
      sourceHandle: LLM_C1
      target: LLM_C2
      targetHandle: LLM_C2
    - id: LLM_C2-LLM_C2-LLM_C3-LLM_C3
      source: LLM_C2
      sourceHandle: LLM_C2
      target: LLM_C3
      targetHandle: LLM_C3
    - id: LLM_C3-LLM_C3-LLM_C4-LLM_C4
      source: LLM_C3
      sourceHandle: LLM_C3
      target: LLM_C4
      targetHandle: LLM_C4
    - id: LLM_C4-LLM_C4-LLM_C5-LLM_C5
      source: LLM_C4
      sourceHandle: LLM_C4
      target: LLM_C5
      targetHandle: LLM_C5

    # ── 分支D串行：案例课-对话型（4节点）──
    - id: LLM_D1-LLM_D1-LLM_D2-LLM_D2
      source: LLM_D1
      sourceHandle: LLM_D1
      target: LLM_D2
      targetHandle: LLM_D2
    - id: LLM_D2-LLM_D2-LLM_D3-LLM_D3
      source: LLM_D2
      sourceHandle: LLM_D2
      target: LLM_D3
      targetHandle: LLM_D3
    - id: LLM_D3-LLM_D3-LLM_D4-LLM_D4
      source: LLM_D3
      sourceHandle: LLM_D3
      target: LLM_D4
      targetHandle: LLM_D4

    # ── 4条分支末端收敛至合规校验 ──
    # 注：只有一条分支会实际执行，未执行分支变量为空
    - id: LLM_A5-LLM_A5-LLM_compliance-LLM_compliance
      source: LLM_A5
      sourceHandle: LLM_A5
      target: LLM_compliance
      targetHandle: LLM_compliance
    - id: LLM_B4-LLM_B4-LLM_compliance-LLM_compliance
      source: LLM_B4
      sourceHandle: LLM_B4
      target: LLM_compliance
      targetHandle: LLM_compliance
    - id: LLM_C5-LLM_C5-LLM_compliance-LLM_compliance
      source: LLM_C5
      sourceHandle: LLM_C5
      target: LLM_compliance
      targetHandle: LLM_compliance
    - id: LLM_D4-LLM_D4-LLM_compliance-LLM_compliance
      source: LLM_D4
      sourceHandle: LLM_D4
      target: LLM_compliance
      targetHandle: LLM_compliance

    # ── 合规校验 → 最终输出 ──
    - id: LLM_compliance-LLM_compliance-End_main-End_main
      source: LLM_compliance
      sourceHandle: LLM_compliance
      target: End_main
      targetHandle: End_main

    nodes:

    # ════════════════════════════════════════
    # 节点1：用户输入（Start节点）
    # ════════════════════════════════════════
    - id: Start_main
      type: Start
      name: 用户输入
      x: 100
      y: 400
      config:
        outputParams:
        - key: input_topic
          type: String
          label: "课程主题（如：重疾险如实告知义务）"
          required: true
        - key: input_type
          type: String
          label: "课程类型：知识课-旁白型 / 知识课-对话型 / 案例课-旁白型 / 案例课-对话型"
          required: true
        - key: input_audience
          type: String
          label: "目标学员：新人代理人 / 在职代理人 / 客户教育"
          required: true
        - key: input_keypoints
          type: String
          label: "核心知识点（1-3个，逗号分隔）"
          required: true
        - key: input_duration
          type: String
          label: "脚本时长：5分钟（约800字） / 8分钟（约1200字）"
          required: true

    # ════════════════════════════════════════
    # 节点2：课程分析+角色匹配（LLM节点）
    # 输出：检索关键词 + 角色配置
    # ════════════════════════════════════════
    - id: LLM_analysis
      type: LLM
      name: 课程分析+角色匹配
      x: 450
      y: 400
      config:
        inputParams:
        - key: input_topic
          valueFrom: refer
        - key: input_type
          valueFrom: refer
        - key: input_audience
          valueFrom: refer
        - key: input_keypoints
          valueFrom: refer
        - key: input_duration
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          promptContent: "你是栗子学院课程策划专家，负责分析课程需求并匹配角色配置。\n\n【课程信息】\n主题：${Start_main.input_topic}\n类型：${Start_main.input_type}\n学员：${Start_main.input_audience}\n知识点：${Start_main.input_keypoints}\n时长：${Start_main.input_duration}\n\n【任务一：检索关键词拆解】\n分别输出以下5个知识库的检索关键词（每库不超过3个，用逗号分隔）：\n\n=== 检索关键词 ===\n合规红线检索词：\n核心概念检索词：\n法规条文检索词：\n产品规则检索词：\n司法案例检索词：\n\n【任务二：角色匹配】\n根据课程类型和学员类型，从以下角色库中匹配本次脚本的角色配置：\n\n角色库：\n- 栗子精灵：品牌吉祥物，古灵精怪活泼，出现在片头片尾和要点提示\n- 美美：35岁资深代理人9年经验，精明能干热情直接，适合讲解分析\n- 乐乐：30岁新人代理人，沉稳憨厚乐天派，适合提问情景模拟\n- 高思聪：28岁，乐乐好友，外向爱社交，适合反面对比案例\n- 郑前：年轻男白领客户，24-30岁，有活力爱学习\n- 高美丽：年轻女白领客户，24-30岁，眼高手低\n- 张总：中年男企业主客户，40-50岁，重事业\n- 张太太：中年女全职太太客户，40-50岁，善理财\n- 刘老板：土豪客户，40-50岁，风险意识强但学习能力差\n\n匹配规则：\n知识课-旁白型 → 旁白者：美美，栗子精灵负责片尾\n知识课-对话型+新人代理人 → 角色A：美美（讲），角色B：乐乐（问）\n知识课-对话型+在职代理人 → 角色A：美美（分享），角色B：乐乐（讨论）\n知识课-对话型+客户教育 → 角色A：乐乐（代理人），角色B：匹配对应客户画像\n案例课-旁白型 → 旁白者：栗子精灵（故事感），美美负责分析段\n案例课-对话型+警示分析 → 角色A：美美，角色B：乐乐\n案例课-对话型+客户场景 → 角色A：乐乐（代理人），角色B：对应客户角色\n\n=== 角色配置 ===\n角色A：{名称} | 身份：{在本课中的身份} | 风格：{说话风格}\n角色B：{名称} | 身份：{在本课中的身份} | 风格：{说话风格}\n栗子精灵出场位置：{片头+片尾 / 仅片尾 / 要点提示}"
          sysPromptContent: "你是栗子学院AI课程生产系统的策划分析助手。严格按照给定规则和输出格式输出，不添加额外内容。"
          modelConfig:
            modelId: qwen3-max-preview
            params:
              top_p: 0.8
              temperature: 0.3
              enable_thinking: true
              thinking_budget: 2000
          shortMemory:
            enable: false
          tryCatchConfig:
            enable: false
          batchEnable: false
          contextSwitch: false

    # ════════════════════════════════════════
    # 节点3A：合规红线库检索（Retrieval，与3B-3E并行）
    # ════════════════════════════════════════
    - id: Retrieval_KB1
      type: Retrieval
      name: 合规红线检索
      x: 800
      y: 50
      config:
        inputParams:
        - key: query
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          topK: 8
          search_mode: direct_search
          knowledgeBaseCodeList:
          - REPLACE_KB1_COMPLIANCE
          query: "${Start_main.input_topic} ${Start_main.input_keypoints}"
          scene_config:
            rerank:
              enable: true
              modelId: qwen3-rerank
            rewrite:
              enable: true

    # ════════════════════════════════════════
    # 节点3B：核心概念库检索（并行）
    # ════════════════════════════════════════
    - id: Retrieval_KB2
      type: Retrieval
      name: 核心概念检索
      x: 800
      y: 200
      config:
        inputParams:
        - key: query
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          topK: 5
          search_mode: direct_search
          knowledgeBaseCodeList:
          - REPLACE_KB2_CONCEPTS
          query: "${Start_main.input_topic} ${Start_main.input_keypoints}"
          scene_config:
            rerank:
              enable: true
              modelId: qwen3-rerank
            rewrite:
              enable: true

    # ════════════════════════════════════════
    # 节点3C：法规条文库检索（并行）
    # ════════════════════════════════════════
    - id: Retrieval_KB3
      type: Retrieval
      name: 法规条文检索
      x: 800
      y: 400
      config:
        inputParams:
        - key: query
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          topK: 8
          search_mode: direct_search
          knowledgeBaseCodeList:
          - REPLACE_KB3_LEGAL
          query: "${Start_main.input_topic} ${Start_main.input_keypoints}"
          scene_config:
            rerank:
              enable: true
              modelId: qwen3-rerank
            rewrite:
              enable: true

    # ════════════════════════════════════════
    # 节点3D：产品规则库检索（并行）
    # ════════════════════════════════════════
    - id: Retrieval_KB4
      type: Retrieval
      name: 产品规则检索
      x: 800
      y: 600
      config:
        inputParams:
        - key: query
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          topK: 8
          search_mode: direct_search
          knowledgeBaseCodeList:
          - REPLACE_KB4_PRODUCTS
          query: "${Start_main.input_topic} ${Start_main.input_keypoints}"
          scene_config:
            rerank:
              enable: true
              modelId: qwen3-rerank
            rewrite:
              enable: true

    # ════════════════════════════════════════
    # 节点3E：司法案例库检索（并行）
    # ════════════════════════════════════════
    - id: Retrieval_KB5
      type: Retrieval
      name: 司法案例检索
      x: 800
      y: 750
      config:
        inputParams:
        - key: query
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
          topK: 5
          search_mode: direct_search
          knowledgeBaseCodeList:
          - REPLACE_KB5_CASES
          query: "${Start_main.input_topic} ${Start_main.input_keypoints}"
          scene_config:
            rerank:
              enable: true
              modelId: qwen3-rerank
            rewrite:
              enable: true

    # ════════════════════════════════════════
    # 节点4：脚本大纲生成（LLM节点）
    # 等待5个检索节点全部完成后执行
    # ════════════════════════════════════════
    - id: LLM_outline
      type: LLM
      name: 脚本大纲生成
      x: 1150
      y: 400
      config:
        inputParams:
        - key: analysis
          valueFrom: refer
        - key: kb1
          valueFrom: refer
        - key: kb2
          valueFrom: refer
        - key: kb3
          valueFrom: refer
        - key: kb4
          valueFrom: refer
        - key: kb5
          valueFrom: refer
        outputParams:
        - key: result
          type: String
        nodeParam:
