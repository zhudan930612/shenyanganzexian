<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理原型 - 可修改机制示例</title>
  <style>
    :root {
      --primary-color: #1a6ebf;
      --primary-soft: #ebf3fb;
      --bg-color: #f5f7fa;
      --text-color: #333333;
      --muted-color: #888888;
      --border-color: #e0e0e0;
      --danger-color: #ff4d4f;
      --success-color: #52c41a;
      --card-radius: 8px;
      --annotation-width: 320px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      height: 56px;
      background: #ffffff;
      border-bottom: 1px solid var(--border-color);
    }

    .topbar-title {
      min-width: 0;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--border-color);
      background: #fff;
      color: var(--text-color);
      height: 32px;
      padding: 0 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: #fff;
    }

    .btn-danger {
      border-color: var(--danger-color);
      color: var(--danger-color);
    }

    .import-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr var(--annotation-width);
      gap: 0;
      min-height: calc(100vh - 56px);
    }

    .left-nav {
      border-right: 1px solid var(--border-color);
      background: #fff;
      padding: 16px 0;
    }

    .nav-title {
      padding: 0 16px 12px;
      color: var(--muted-color);
      font-size: 12px;
    }

    .nav-item {
      padding: 10px 16px;
      border-left: 3px solid transparent;
      background: #fff;
      font-size: 14px;
    }

    .nav-item.active {
      border-left-color: var(--primary-color);
      background: var(--primary-soft);
      color: var(--primary-color);
      font-weight: 600;
    }

    .main {
      padding: 20px;
      overflow-x: auto;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.4;
    }

    .card-desc {
      margin: 0 0 12px;
      color: var(--muted-color);
      line-height: 1.6;
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 4px;
      padding: 0 8px;
      font-size: 12px;
      background: #f0f0f0;
      color: #666;
    }

    .tag-success {
      background: #f6ffed;
      color: var(--success-color);
      border: 1px solid #b7eb8f;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 640px;
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f5f7fa;
      font-weight: 600;
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    .annotation {
      border-left: 1px solid var(--border-color);
      background: #fff;
      padding: 16px;
      overflow-y: auto;
    }

    .annotation-title {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .annotation-section {
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 10px;
      margin-bottom: 10px;
      background: #fff;
    }

    .annotation-section h4 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    .annotation-section p,
    .annotation-section li {
      margin: 0 0 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #555;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      margin-top: 10px;
    }

    .control-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .control-item input[type="number"] {
      width: 72px;
      height: 28px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 0 6px;
    }

    .control-item input[type="color"] {
      width: 36px;
      height: 28px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: #fff;
      padding: 0;
    }

    .json-preview {
      margin-top: 10px;
      background: #0b1020;
      color: #d0e3ff;
      border-radius: 6px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
    }

    .editable {
      outline: 1px dashed var(--primary-color);
      outline-offset: 2px;
      border-radius: 4px;
      background: rgba(26, 110, 191, 0.04);
    }

    .hint {
      margin: 0;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: #1f2d3d;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 180ms ease-out;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1280px) {
      .layout {
        grid-template-columns: 220px 1fr;
      }
      .annotation {
        position: fixed;
        right: 0;
        top: 56px;
        bottom: 0;
        width: min(90vw, var(--annotation-width));
        box-shadow: -8px 0 24px rgba(0, 0, 0, 0.12);
        transform: translateX(100%);
        transition: transform 220ms ease-out;
        z-index: 60;
      }
      .annotation.open {
        transform: translateX(0);
      }
    }

    @media (max-width: 767px) {
      .topbar {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
      }
      .layout {
        display: block;
      }
      .left-nav {
        display: none;
      }
      .main {
        padding: 12px;
      }
      .card-title {
        font-size: 18px;
      }
      .btn {
        height: 40px;
      }
      .control-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">产品工具 · 用户管理原型（可修改机制示例）</div>
    <div class="toolbar">
      <button id="toggleAnnotationBtn" class="btn">查看标注</button>
      <button id="toggleEditBtn" class="btn">✏ 编辑文案</button>
      <button id="saveBtn" class="btn btn-primary">💾 保存覆盖</button>
      <button id="sampleBtn" class="btn">套用示例改动</button>
      <button id="resetBtn" class="btn btn-danger">恢复默认</button>
      <button id="exportBtn" class="btn">导出 custom.json</button>
      <label class="btn import-label" for="importInput">导入 custom.json</label>
      <input id="importInput" type="file" accept=".json,application/json" style="display:none;">
    </div>
  </header>

  <div class="layout">
    <aside class="left-nav">
      <div class="nav-title">功能单元导航</div>
      <div class="nav-item active">功能单元 1：用户管理</div>
      <div class="nav-item">功能单元 2：角色配置（示意）</div>
    </aside>

    <main class="main">
      <section class="card">
        <div class="card-header">
          <h2 class="card-title editable-text" data-edit-key="unit.user_mgmt.title"></h2>
          <span class="tag tag-success">✅ 可交付开发</span>
        </div>
        <p class="card-desc editable-text" data-edit-key="unit.user_mgmt.subtitle"></p>
        <div class="action-row">
          <button class="btn btn-primary editable-text" data-edit-key="btn.create_user"></button>
          <button class="btn editable-text" data-edit-key="btn.batch_enable"></button>
          <button class="btn editable-text" data-edit-key="btn.batch_disable"></button>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h3 class="editable-text" data-edit-key="table.title"></h3>
        </div>
        <table>
          <thead>
            <tr>
              <th class="editable-text" data-edit-key="table.col.name"></th>
              <th class="editable-text" data-edit-key="table.col.account"></th>
              <th class="editable-text" data-edit-key="table.col.role"></th>
              <th class="editable-text" data-edit-key="table.col.status"></th>
              <th class="editable-text" data-edit-key="table.col.last_active"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>张三</td><td>zs001</td><td>系统管理员</td><td>已启用</td><td>2026-03-22</td>
            </tr>
            <tr>
              <td>李四</td><td>ls002</td><td>审核员</td><td>已停用</td><td>2026-03-18</td>
            </tr>
            <tr>
              <td>王五</td><td>ww003</td><td>内勤人员</td><td>已启用</td><td>2026-03-24</td>
            </tr>
            <tr>
              <td>赵六</td><td>zl004</td><td>业务员</td><td>待审核</td><td>2026-03-21</td>
            </tr>
            <tr>
              <td>孙七</td><td>sq005</td><td>访客</td><td>已启用</td><td>2026-03-20</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <aside id="annotationPanel" class="annotation">
      <h3 class="annotation-title">📋 开发参考面板</h3>
      <section class="annotation-section">
        <h4 class="editable-text" data-edit-key="annotation.desc.title"></h4>
        <p class="editable-text" data-edit-key="annotation.desc.goal"></p>
        <p class="editable-text" data-edit-key="annotation.desc.scene"></p>
      </section>
      <section class="annotation-section">
        <h4 class="editable-text" data-edit-key="annotation.interaction.title"></h4>
        <ul>
          <li class="editable-text" data-edit-key="annotation.interaction.item1"></li>
          <li class="editable-text" data-edit-key="annotation.interaction.item2"></li>
        </ul>
      </section>
      <section class="annotation-section">
        <h4 class="editable-text" data-edit-key="annotation.rule.title"></h4>
        <p class="editable-text" data-edit-key="annotation.rule.item1"></p>
        <p class="editable-text" data-edit-key="annotation.rule.item2"></p>
      </section>
      <section class="annotation-section">
        <h4 class="editable-text" data-edit-key="annotation.pending.title"></h4>
        <p class="editable-text" data-edit-key="annotation.pending.item1"></p>
      </section>

      <section class="annotation-section">
        <h4>🎛 样式覆盖（也会被保存）</h4>
        <div class="control-grid">
          <label class="control-item">
            主色
            <input id="primaryColorInput" type="color" value="#1a6ebf">
          </label>
          <label class="control-item">
            圆角
            <input id="radiusInput" type="number" min="0" max="20" value="8">
          </label>
          <label class="control-item">
            右侧面板宽度
            <input id="panelWidthInput" type="number" min="260" max="420" value="320">
          </label>
          <label class="control-item">
            背景色
            <input id="bgColorInput" type="color" value="#f5f7fa">
          </label>
        </div>
      </section>

      <section class="annotation-section">
        <h4>🧠 当前覆盖 JSON 预览</h4>
        <p class="hint">你修改后点“保存覆盖”，这里会显示最终 custom.json 内容。</p>
        <pre id="jsonPreview" class="json-preview"></pre>
      </section>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (function () {
      const STORAGE_KEY = "proto_demo_user_mgmt_overrides_v1";

      const defaultModel = {
        version: 1,
        text: {
          "unit.user_mgmt.title": "用户管理",
          "unit.user_mgmt.subtitle": "支持账号创建、角色分配、启停状态维护。该页演示“生成层 + 覆盖层”机制。",
          "btn.create_user": "新建用户 +",
          "btn.batch_enable": "批量启用",
          "btn.batch_disable": "批量停用",
          "table.title": "用户列表（默认生成内容）",
          "table.col.name": "姓名",
          "table.col.account": "账号",
          "table.col.role": "角色",
          "table.col.status": "状态",
          "table.col.last_active": "最后活跃日期",
          "annotation.desc.title": "📖 功能说明",
          "annotation.desc.goal": "功能目标：统一管理平台账号，减少人工重复操作。",
          "annotation.desc.scene": "使用场景：新员工入职开通、离职停用、角色调整。",
          "annotation.interaction.title": "🔗 交互说明",
          "annotation.interaction.item1": "点击“新建用户”弹出创建弹窗，提交后刷新列表。",
          "annotation.interaction.item2": "批量操作前需二次确认，避免误操作。",
          "annotation.rule.title": "📐 业务规则",
          "annotation.rule.item1": "账号必须唯一，重复账号不允许提交。",
          "annotation.rule.item2": "停用账号不可登录，但历史操作记录保留。",
          "annotation.pending.title": "⚠ 待确认项",
          "annotation.pending.item1": "[AC-08] 是否对接统一认证（SSO）？"
        },
        style: {
          primaryColor: "#1a6ebf",
          cardRadius: 8,
          panelWidth: 320,
          bgColor: "#f5f7fa"
        }
      };

      const sampleOverrides = {
        version: 1,
        text: {
          "unit.user_mgmt.title": "账号与权限中心",
          "unit.user_mgmt.subtitle": "这是套用“覆盖层”后的文案。生成层不改，改动可反复叠加。",
          "btn.create_user": "新增账号 +",
          "table.title": "账号清单（来自 custom 覆盖）",
          "annotation.pending.item1": "[AC-08] SSO 对接后，账号创建是否改为只读同步？"
        },
        style: {
          primaryColor: "#0b5cad",
          cardRadius: 10,
          panelWidth: 340,
          bgColor: "#f1f5fa"
        }
      };

      let overrides = loadOverrides();
      let editMode = false;

      const panel = document.getElementById("annotationPanel");
      const toggleAnnotationBtn = document.getElementById("toggleAnnotationBtn");
      const toggleEditBtn = document.getElementById("toggleEditBtn");
      const saveBtn = document.getElementById("saveBtn");
      const sampleBtn = document.getElementById("sampleBtn");
      const resetBtn = document.getElementById("resetBtn");
      const exportBtn = document.getElementById("exportBtn");
      const importInput = document.getElementById("importInput");

      const primaryColorInput = document.getElementById("primaryColorInput");
      const radiusInput = document.getElementById("radiusInput");
      const panelWidthInput = document.getElementById("panelWidthInput");
      const bgColorInput = document.getElementById("bgColorInput");
      const jsonPreview = document.getElementById("jsonPreview");

      applyAll();
      bindEvents();

      function bindEvents() {
        toggleAnnotationBtn.addEventListener("click", function () {
          panel.classList.toggle("open");
        });

        toggleEditBtn.addEventListener("click", function () {
          editMode = !editMode;
          toggleEditBtn.textContent = editMode ? "完成编辑" : "✏ 编辑文案";
          document.querySelectorAll(".editable-text").forEach(function (el) {
            el.contentEditable = editMode ? "true" : "false";
            el.classList.toggle("editable", editMode);
          });
          showToast(editMode ? "已进入编辑模式" : "已退出编辑模式");
        });

        [primaryColorInput, radiusInput, panelWidthInput, bgColorInput].forEach(function (input) {
          input.addEventListener("input", function () {
            applyStylePreviewFromInputs();
            updatePreview();
          });
        });

        saveBtn.addEventListener("click", function () {
          overrides = buildOverridesFromCurrentView();
          persistOverrides(overrides);
          applyAll();
          showToast("覆盖已保存（本地）");
        });

        sampleBtn.addEventListener("click", function () {
          overrides = normalizeOverrides(sampleOverrides);
          persistOverrides(overrides);
          applyAll();
          showToast("已套用示例改动");
        });

        resetBtn.addEventListener("click", function () {
          overrides = { version: 1, text: {}, style: {} };
          localStorage.removeItem(STORAGE_KEY);
          applyAll();
          showToast("已恢复默认生成内容");
        });

        exportBtn.addEventListener("click", function () {
          overrides = buildOverridesFromCurrentView();
          persistOverrides(overrides);
          exportOverrides(overrides);
          applyAll();
          showToast("custom.json 已导出");
        });

        importInput.addEventListener("change", function (event) {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function () {
            try {
              const parsed = JSON.parse(String(reader.result || "{}"));
              overrides = normalizeOverrides(parsed);
              persistOverrides(overrides);
              applyAll();
              showToast("已导入 custom.json");
            } catch (error) {
              showToast("导入失败：JSON 格式不正确");
            } finally {
              importInput.value = "";
            }
          };
          reader.readAsText(file, "utf-8");
        });
      }

      function loadOverrides() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { version: 1, text: {}, style: {} };
          return normalizeOverrides(JSON.parse(raw));
        } catch (error) {
          return { version: 1, text: {}, style: {} };
        }
      }

      function normalizeOverrides(value) {
        const safe = value && typeof value === "object" ? value : {};
        const text = safe.text && typeof safe.text === "object" ? safe.text : {};
        const style = safe.style && typeof safe.style === "object" ? safe.style : {};
        return { version: 1, text: text, style: style };
      }

      function persistOverrides(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function buildMergedModel() {
        return {
          version: 1,
          text: Object.assign({}, defaultModel.text, overrides.text || {}),
          style: Object.assign({}, defaultModel.style, overrides.style || {})
        };
      }

      function applyAll() {
        const merged = buildMergedModel();
        applyText(merged.text);
        applyStyle(merged.style);
        syncStyleInputs(merged.style);
        updatePreview();
      }

      function applyText(textMap) {
        document.querySelectorAll("[data-edit-key]").forEach(function (el) {
          const key = el.getAttribute("data-edit-key");
          if (Object.prototype.hasOwnProperty.call(textMap, key)) {
            el.textContent = textMap[key];
          }
        });
      }

      function applyStyle(styleMap) {
        document.documentElement.style.setProperty("--primary-color", styleMap.primaryColor);
        document.documentElement.style.setProperty("--primary-soft", hexToRgba(styleMap.primaryColor, 0.12));
        document.documentElement.style.setProperty("--card-radius", String(toNumber(styleMap.cardRadius, 8)) + "px");
        document.documentElement.style.setProperty("--annotation-width", String(toNumber(styleMap.panelWidth, 320)) + "px");
        document.documentElement.style.setProperty("--bg-color", styleMap.bgColor);
      }

      function syncStyleInputs(styleMap) {
        primaryColorInput.value = normalizeColor(styleMap.primaryColor, "#1a6ebf");
        radiusInput.value = String(toNumber(styleMap.cardRadius, 8));
        panelWidthInput.value = String(toNumber(styleMap.panelWidth, 320));
        bgColorInput.value = normalizeColor(styleMap.bgColor, "#f5f7fa");
      }

      function applyStylePreviewFromInputs() {
        document.documentElement.style.setProperty("--primary-color", primaryColorInput.value);
        document.documentElement.style.setProperty("--primary-soft", hexToRgba(primaryColorInput.value, 0.12));
        document.documentElement.style.setProperty("--card-radius", radiusInput.value + "px");
        document.documentElement.style.setProperty("--annotation-width", panelWidthInput.value + "px");
        document.documentElement.style.setProperty("--bg-color", bgColorInput.value);
      }

      function buildOverridesFromCurrentView() {
        const textOverrides = {};
        Object.keys(defaultModel.text).forEach(function (key) {
          const el = document.querySelector('[data-edit-key="' + key + '"]');
          if (!el) return;
          const current = (el.textContent || "").trim();
          const original = defaultModel.text[key];
          if (current !== original) {
            textOverrides[key] = current;
          }
        });

        const styleOverrides = {};
        const styleCurrent = {
          primaryColor: normalizeColor(primaryColorInput.value, defaultModel.style.primaryColor),
          cardRadius: toNumber(radiusInput.value, defaultModel.style.cardRadius),
          panelWidth: toNumber(panelWidthInput.value, defaultModel.style.panelWidth),
          bgColor: normalizeColor(bgColorInput.value, defaultModel.style.bgColor)
        };

        Object.keys(styleCurrent).forEach(function (key) {
          if (styleCurrent[key] !== defaultModel.style[key]) {
            styleOverrides[key] = styleCurrent[key];
          }
        });

        return {
          version: 1,
          text: textOverrides,
          style: styleOverrides
        };
      }

      function exportOverrides(data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "用户管理原型.custom.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function updatePreview() {
        jsonPreview.textContent = JSON.stringify(buildOverridesFromCurrentView(), null, 2);
      }

      function normalizeColor(value, fallback) {
        if (typeof value !== "string") return fallback;
        if (/^#[0-9a-fA-F]{6}$/.test(value)) return value.toLowerCase();
        return fallback;
      }

      function toNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function hexToRgba(hex, alpha) {
        const safe = normalizeColor(hex, "#1a6ebf");
        const r = parseInt(safe.slice(1, 3), 16);
        const g = parseInt(safe.slice(3, 5), 16);
        const b = parseInt(safe.slice(5, 7), 16);
        return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
      }

      let toastTimer = null;
      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("show");
        }, 1800);
      }
    })();
  </script>
</body>
</html>
